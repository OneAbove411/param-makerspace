<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Param Makerspace — Site Roadmap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #101012;
    color: #e8e8e8;
    min-height: 100vh;
  }

  /* ── Header ── */
  .hdr {
    text-align: center; padding: 48px 24px 8px;
  }
  .hdr h1 {
    font-size: 28px; font-weight: 800; color: #fff;
    letter-spacing: -0.8px;
  }
  .hdr p { font-size: 13px; color: #666; margin-top: 6px; }

  /* ── Legend ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 16px;
    justify-content: center; padding: 20px 24px 36px;
  }
  .leg {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: #999;
  }
  .leg i {
    width: 14px; height: 14px; border-radius: 3px;
    display: inline-block;
  }

  /* ── Canvas ── */
  .wrap { max-width: 960px; margin: 0 auto; padding: 0 16px 100px; }

  /* ── Node ── */
  .nd {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; color: #000;
    padding: 10px 18px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; user-select: none;
    transition: border-color 0.12s, box-shadow 0.12s, transform 0.1s;
    position: relative;
    line-height: 1.3;
  }
  .nd:hover { border-color: #2B78E4; box-shadow: 0 0 0 3px rgba(43,120,228,0.15); transform: translateY(-1px); }
  .nd.on { border-color: #2B78E4; box-shadow: 0 0 0 3px rgba(43,120,228,0.2); }

  .nd .caret {
    display: inline-block; font-size: 8px; color: #2B78E4;
    transition: transform 0.15s; flex-shrink: 0;
    width: 12px; text-align: center;
  }
  .nd.on .caret { transform: rotate(90deg); }
  .nd.lf { cursor: default; border-color: #e8e8e8; background: #fafafa; }
  .nd.lf:hover { border-color: #e8e8e8; box-shadow: none; transform: none; }

  /* ── Category left-stripe ── */
  .nd::before {
    content: '';
    position: absolute; left: -2px; top: 6px; bottom: 6px;
    width: 4px; border-radius: 2px;
  }
  .nd.t-page::before   { background: #2B78E4; }
  .nd.t-action::before { background: #3fb950; }
  .nd.t-auth::before   { background: #874efe; }
  .nd.t-admin::before  { background: #e94560; }
  .nd.t-section::before{ background: transparent; }
  .nd.t-nav::before    { background: #f0883e; }
  .nd.t-root::before   { background: transparent; }

  /* Root node special */
  .nd.t-root {
    background: #2B78E4; color: #fff; border-color: #2B78E4;
    font-size: 16px; font-weight: 800; letter-spacing: -0.3px;
    padding: 14px 28px; border-radius: 10px;
  }
  .nd.t-root:hover { box-shadow: 0 0 0 4px rgba(43,120,228,0.3); border-color: #2B78E4; }
  .nd.t-root::before { display: none; }
  .nd.t-root .caret { color: #fff; }

  /* Page nodes - slightly bolder */
  .nd.t-page { font-weight: 700; }

  /* Section / leaf nodes - lighter */
  .nd.t-section { background: #f6f6f6; color: #444; font-weight: 500; font-size: 13px; border-color: #eaeaea; }
  .nd.t-section:hover { border-color: #ccc; box-shadow: none; transform: none; }

  /* ── Tree connector lines ── */
  .kids {
    display: none; position: relative;
    margin-left: 24px;
    padding-left: 28px;
    margin-top: 2px;
  }
  .kids.on { display: block; }

  /* Vertical line */
  .kids::before {
    content: '';
    position: absolute;
    left: 8px; top: 0; bottom: 12px;
    width: 0;
    border-left: 2.5px solid #2B78E4;
    border-radius: 2px;
    opacity: 0.35;
  }

  .rw { padding: 5px 0; position: relative; }

  /* Horizontal branch line */
  .rw::before {
    content: '';
    position: absolute;
    left: -20px; top: 19px;
    width: 18px;
    border-top: 2.5px solid #2B78E4;
    opacity: 0.35;
    border-radius: 2px;
  }

  /* Branch dot */
  .rw::after {
    content: '';
    position: absolute;
    left: -22px; top: 15px;
    width: 7px; height: 7px;
    background: #2B78E4;
    border-radius: 50%;
    opacity: 0.5;
  }

  /* ── Center the root ── */
  .root-center { display: flex; flex-direction: column; align-items: center; }
  .root-center > .rw { width: 100%; }
  .root-center > .rw::before,
  .root-center > .rw::after { display: none; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .nd { font-size: 12px; padding: 8px 14px; }
    .nd.t-root { font-size: 14px; padding: 12px 20px; }
    .kids { margin-left: 14px; padding-left: 20px; }
    .rw::before { left: -14px; width: 12px; }
    .rw::after { left: -16px; }
  }
</style>
</head>

function mk(n, p) {

    box.className = 'kids';
    n.k.forEach(c => mk(c, box));
    rw.appendChild(box);
    el.onclick = () => { box.classList.toggle('on'); el.classList.toggle('on'); };
  }

}
